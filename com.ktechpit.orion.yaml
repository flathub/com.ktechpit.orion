app-id: com.ktechpit.orion
base: io.qt.qtwebengine.BaseApp
base-version: '6.10'
runtime: org.kde.Platform
runtime-version: '6.10'
sdk: org.kde.Sdk
command: orion
finish-args:
  - --device=all
  - --env=INSTALL_TYPE=flatpak
  - --filesystem=xdg-run/gvfsd
  - --share=ipc
  - --share=network
  - --socket=fallback-x11
  - --socket=pulseaudio
  - --socket=wayland
  - --talk-name=org.freedesktop.FileManager1
  - --own-name=org.mpris.MediaPlayer2.mpv.*
  - --talk-name=org.gnome.SessionManager
  - --system-talk-name=org.freedesktop.UPower.*

  # download directories for convenience
  - --filesystem=xdg-desktop
  - --filesystem=xdg-download
  - --filesystem=xdg-music
  - --filesystem=xdg-pictures
  - --filesystem=xdg-videos


cleanup:
  - /include
  - /lib/cmake
  - /share/man
  - /share/doc
  - /lib/pkgconfig

cleanup-commands:
  - /app/cleanup-BaseApp.sh

modules:
  - shared-modules/squashfs-tools/squashfs-tools.json

  - name: luajit
    no-autogen: true
    cleanup:
      - /bin
      - /include
      - /lib/pkgconfig
      - /share/man
    sources:
      - type: git
        url: https://github.com/LuaJIT/LuaJIT.git
        disable-shallow-clone: true
        commit: 659a61693aa3b87661864ad0f12eee14c865cd7f
      - type: shell
        commands:
          - sed -i 's|/usr/local|/app|' ./Makefile

  - name: libass
    config-opts:
      - --disable-static
    sources:
      - type: archive
        url: https://github.com/libass/libass/releases/download/0.17.4/libass-0.17.4.tar.xz
        sha256: 78f1179b838d025e9c26e8fef33f8092f65611444ffa1bfc0cfac6a33511a05a

  - name: libplacebo
    buildsystem: meson
    config-opts:
      - -Dvulkan=disabled
      - -Dshaderc=disabled
    sources:
      - type: git
        url: https://github.com/haasn/libplacebo.git
        tag: v7.360.1
        commit: cee9b076f2c63104ccfd497fa79c39a867293ec4

  - name: mpv
    buildsystem: meson
    build-options:
      cflags: -DNDEBUG=1
    config-opts:
      - -Dlibmpv=true
      - -Dbuild-date=false
      - -Dpulse=enabled
      - -Dalsa=enabled
      - -Dmanpage-build=disabled
      - -Dcdda=disabled
      - -Ddvbin=disabled
      - -Ddvdnav=disabled
      - -Djavascript=disabled
      - -Dlibarchive=disabled
      - -Dlua=enabled
      - -Dshaderc=disabled
      - -Dvulkan=disabled
    sources:
      - type: archive
        url: https://github.com/mpv-player/mpv/archive/refs/tags/v0.41.0.tar.gz
        sha256: ee21092a5ee427353392360929dc64645c54479aefdb5babc5cfbb5fad626209

  - name: orion
    buildsystem: simple
    build-commands:
        - unsquashfs -no-progress *.snap
        - cp -r squashfs-root/usr/share/icons ${FLATPAK_DEST}/share/

        - install -d ${FLATPAK_DEST}/bin
        - cp -r squashfs-root/usr/bin/* ${FLATPAK_DEST}/bin/

        - install -Dm644 squashfs-root/usr/share/applications/com.ktechpit.orion.desktop ${FLATPAK_DEST}/share/applications/com.ktechpit.orion.desktop
        - desktop-file-edit --set-icon=${FLATPAK_ID} ${FLATPAK_DEST}/share/applications/com.ktechpit.orion.desktop
        - install -Dm644 squashfs-root/usr/share/metainfo/com.ktechpit.orion.metainfo.xml ${FLATPAK_DEST}/share/metainfo/com.ktechpit.orion.metainfo.xml

    sources:
        # =========================
        # x86_64 – stable
        # =========================
        - type: file
          url: https://api.snapcraft.io/api/v1/snaps/download/mxJjEy7qHbIIUwLKrkjqbuLDSG1GcR5Y_95.snap
          sha256: 7aa39bc7bd6be1fddc52c3da38331da01ac0716cf33ba06f7f5940a5bdd1d931
          only-arches:
            - x86_64



        # =========================
        # aarch64 – stable
        # =========================
        - type: file
          url: https://api.snapcraft.io/api/v1/snaps/download/mxJjEy7qHbIIUwLKrkjqbuLDSG1GcR5Y_96.snap
          sha256: 1b87d1525cd9acbd2e455527832e77f908edc115818713773c87666a1c4548b2
          only-arches:
            - aarch64
